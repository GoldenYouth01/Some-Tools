<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>音律联觉共享地图</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; overflow: hidden; }

    /* ========== 登录页 ========== */
    #auth-page {
      position: fixed; inset: 0;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      display: flex; align-items: center; justify-content: center;
      z-index: 20000;
    }
    #auth-page.hidden { display: none; }

    .auth-card {
      background: #fff; border-radius: 16px;
      padding: 36px 32px; width: 420px; max-width: 90vw;
      max-height: 90vh; overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .auth-logo { text-align: center; margin-bottom: 28px; }
    .auth-logo h1 { font-size: 24px; color: #1e293b; font-weight: 700; }
    .auth-logo p { font-size: 13px; color: #94a3b8; margin-top: 6px; }

    .auth-tabs {
      display: flex; margin-bottom: 24px;
      border-bottom: 2px solid #e2e8f0;
    }
    .auth-tab {
      flex: 1; padding: 10px; text-align: center;
      background: none; border: none; cursor: pointer;
      font-size: 15px; font-weight: 500; color: #94a3b8;
      border-bottom: 2px solid transparent; margin-bottom: -2px;
      transition: all 0.2s;
    }
    .auth-tab.active { color: #3b82f6; border-bottom-color: #3b82f6; }

    .auth-form-group { margin-bottom: 16px; }
    .auth-form-group > label {
      display: block; font-size: 13px; font-weight: 500;
      color: #64748b; margin-bottom: 6px;
    }
    .auth-form-group input[type="text"],
    .auth-form-group input[type="password"] {
      width: 100%; padding: 10px 14px;
      border: 1px solid #e2e8f0; border-radius: 8px;
      font-size: 14px; font-family: inherit; outline: none;
      transition: border-color 0.2s;
    }
    .auth-form-group input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
    }
    .auth-form-group input.error { border-color: #ef4444; }

    .auth-error { font-size: 12px; color: #ef4444; margin-top: 4px; display: none; }
    .auth-error.show { display: block; }
    .auth-submit {
      width: 100%; padding: 12px; border: none; border-radius: 8px;
      background: #3b82f6; color: #fff; font-size: 15px; font-weight: 500;
      cursor: pointer; transition: background 0.15s; margin-top: 4px;
    }
    .auth-submit:hover { background: #2563eb; }
    .auth-submit:disabled { background: #93c5fd; cursor: not-allowed; }
    .auth-panel { display: none; }
    .auth-panel.active { display: block; }

    .team-radios {
      display: flex; gap: 16px; margin-top: 4px; margin-bottom: 12px;
    }
    .radio-label {
      display: flex; align-items: center; gap: 6px;
      font-size: 14px; color: #334155; cursor: pointer;
    }
    .radio-label input[type="radio"] { accent-color: #3b82f6; }
    .auth-divider { height: 1px; background: #e2e8f0; margin: 20px 0; }

    /* ========== 地图页 ========== */
    #map-page { display: none; width: 100vw; height: 100vh; }
    #map-page.visible { display: block; }
    #map-container { width: 100%; height: 100%; }

    /* ========== 地图控件 ========== */
    #map-controls {
      position: fixed; top: 16px; right: 16px;
      z-index: 1000;
      display: flex; gap: 4px;
      background: #fff; border-radius: 8px;
      padding: 4px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .mode-btn {
      padding: 8px 16px; border: none; border-radius: 6px;
      background: transparent; color: #64748b;
      font-size: 13px; cursor: pointer;
      transition: all 0.15s;
    }
    .mode-btn.active { background: #3b82f6; color: #fff; }
    .mode-btn:hover:not(.active) { background: #f1f5f9; }

    .controls-sep { width: 1px; background: #e2e8f0; margin: 4px 2px; }
    .traffic-btn {
      padding: 8px 16px; border: 1px solid #e2e8f0; border-radius: 6px;
      background: transparent; color: #64748b;
      font-size: 13px; cursor: pointer;
      transition: all 0.15s;
    }
    .traffic-btn.active { background: #10b981; color: #fff; border-color: #10b981; }
    .traffic-btn:hover:not(.active) { background: #f1f5f9; }

    /* ========== 侧边栏 ========== */
    #sidebar {
      position: fixed; top: 0; left: 0;
      width: 320px; height: 100vh;
      background: #1e293b; color: #f8fafc;
      display: flex; flex-direction: column;
      z-index: 1000;
      transform: translateX(0);
      transition: transform 0.3s ease;
    }
    #sidebar.collapsed { transform: translateX(-320px); }

    .sidebar-header {
      padding: 20px 16px;
      border-bottom: 1px solid #334155;
      display: flex; align-items: center; justify-content: space-between;
    }
    .sidebar-header h2 { font-size: 18px; font-weight: 600; }
    .sidebar-header .count {
      background: #3b82f6; color: #fff;
      padding: 2px 10px; border-radius: 12px; font-size: 12px;
    }
    .user-bar {
      padding: 10px 16px;
      background: #0f172a;
      display: flex; align-items: center; justify-content: space-between;
      font-size: 13px; color: #94a3b8;
    }
    .user-bar span { color: #e2e8f0; font-weight: 500; }
    #btn-logout, #btn-home {
      background: none; border: 1px solid #475569; color: #94a3b8;
      padding: 4px 12px; border-radius: 4px; font-size: 12px;
      cursor: pointer; transition: all 0.15s; text-decoration: none;
    }
    #btn-logout:hover { border-color: #ef4444; color: #ef4444; }
    #btn-home:hover { border-color: #3b82f6; color: #3b82f6; }

    .team-bar {
      padding: 12px 16px;
      background: #162032;
      border-bottom: 1px solid #334155;
    }
    .team-info-row {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 8px;
    }
    .team-tag {
      font-size: 11px; color: #3b82f6;
      background: rgba(59,130,246,0.15);
      padding: 2px 8px; border-radius: 4px;
    }
    .team-name-text { font-size: 14px; color: #f8fafc; font-weight: 500; }
    .invite-row { display: flex; align-items: center; gap: 8px; }
    .invite-label { font-size: 12px; color: #64748b; }
    .invite-code {
      font-family: 'Courier New', monospace;
      font-size: 14px; color: #fbbf24;
      letter-spacing: 2px; cursor: pointer;
      padding: 2px 10px; border-radius: 4px;
      background: rgba(251,191,36,0.1);
      transition: background 0.15s;
      user-select: all;
    }
    .invite-code:hover { background: rgba(251,191,36,0.25); }
    .invite-hint { font-size: 11px; color: #475569; margin-left: auto; }

    #marker-list { flex: 1; overflow-y: auto; }
    #marker-list::-webkit-scrollbar { width: 6px; }
    #marker-list::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }

    .empty-state {
      text-align: center; color: #64748b;
      padding: 60px 20px; font-size: 14px; line-height: 2;
    }
    .marker-item {
      padding: 14px 16px;
      border-bottom: 1px solid #334155;
      cursor: pointer;
      transition: background 0.15s;
    }
    .marker-item:hover { background: #334155; }
    .marker-item .row { display: flex; align-items: center; gap: 10px; }
    .marker-item .dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    .marker-item .info { flex: 1; min-width: 0; }
    .marker-item .name {
      font-weight: 600; font-size: 14px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .marker-item .coords { font-size: 12px; color: #94a3b8; margin-top: 2px; }
    .marker-item .delete-btn {
      background: none; border: none; color: #64748b;
      font-size: 20px; cursor: pointer; padding: 4px 8px;
      border-radius: 4px; transition: all 0.15s;
    }
    .marker-item .delete-btn:hover { color: #ef4444; background: rgba(239,68,68,0.1); }

    #sidebar-toggle {
      position: fixed; top: 16px; left: 16px; z-index: 1001;
      background: #fff; border: none; border-radius: 8px;
      width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      cursor: pointer; font-size: 18px;
      transition: all 0.3s ease;
    }
    #sidebar-toggle:hover { background: #f1f5f9; }
    #sidebar:not(.collapsed) ~ #sidebar-toggle { left: 328px; }

    /* ========== 添加标点表单 ========== */
    #marker-form {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.5);
      z-index: 9999;
    }
    #marker-form.hidden { display: none; }

    .form-card {
      background: #fff; border-radius: 12px;
      padding: 28px; width: 420px; max-width: 90vw;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .form-card h3 { font-size: 18px; font-weight: 600; color: #1e293b; margin-bottom: 20px; }
    .form-card label {
      display: block; font-size: 13px; font-weight: 500;
      color: #64748b; margin-bottom: 6px;
    }
    .form-card input[type="text"],
    .form-card textarea,
    .form-card select {
      width: 100%; padding: 10px 14px;
      border: 1px solid #e2e8f0; border-radius: 8px;
      font-size: 14px; font-family: inherit;
      transition: border-color 0.2s; outline: none;
    }
    .form-card input:focus,
    .form-card textarea:focus,
    .form-card select:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
    }
    .form-card input.error { border-color: #ef4444; }
    .form-group { margin-bottom: 16px; }
    .form-row { display: flex; gap: 12px; }
    .form-row .form-group { flex: 1; }
    .form-card textarea { resize: vertical; min-height: 80px; }
    .form-actions { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }
    .btn {
      padding: 10px 24px; border-radius: 8px; border: none;
      font-size: 14px; font-weight: 500; cursor: pointer;
      transition: all 0.15s;
    }
    .btn-primary { background: #3b82f6; color: #fff; }
    .btn-primary:hover { background: #2563eb; }
    .btn-primary:disabled { background: #93c5fd; cursor: not-allowed; }
    .btn-cancel { background: #f1f5f9; color: #475569; }
    .btn-cancel:hover { background: #e2e8f0; }

    /* ========== InfoWindow ========== */
    .custom-info-window {
      background: #fff; border-radius: 10px;
      padding: 14px 18px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      max-width: 280px; position: relative;
    }
    .custom-info-window::after {
      content: ''; position: absolute; bottom: -8px; left: 50%;
      transform: translateX(-50%);
      border-left: 8px solid transparent;
      border-right: 8px solid transparent;
      border-top: 8px solid #fff;
    }
    .info-name { font-weight: 600; font-size: 15px; color: #1e293b; margin-bottom: 8px; }
    .info-category {
      display: inline-block; padding: 2px 10px; border-radius: 4px;
      font-size: 11px; color: #fff; margin-bottom: 6px;
    }
    .info-desc { font-size: 13px; color: #475569; margin-top: 8px; line-height: 1.5; }
    .info-coords { font-size: 11px; color: #94a3b8; margin-top: 8px; }

    #status-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(30,41,59,0.92); color: #94a3b8;
      padding: 8px 20px; font-size: 12px; z-index: 999;
      backdrop-filter: blur(4px);
    }

    /* ========== 移动端适配 ========== */
    .sidebar-backdrop {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.4); z-index: 999;
    }
    .sidebar-backdrop.show { display: block; }

    @media (max-width: 768px) {
      /* 侧边栏：覆盖模式 */
      #sidebar {
        width: 85vw; max-width: 360px;
        z-index: 1100;
      }
      #sidebar.collapsed { transform: translateX(-85vw); }

      /* 切换按钮：始终固定位置 */
      #sidebar:not(.collapsed) ~ #sidebar-toggle { left: 16px; }

      /* 地图控件：缩小 */
      #map-controls {
        top: auto; bottom: 44px; right: 8px; left: 8px;
        justify-content: center;
      }
      .mode-btn { padding: 6px 10px; font-size: 12px; }
      .traffic-btn { padding: 6px 10px; font-size: 12px; }

      /* 登录卡片 */
      .auth-card { max-width: 95vw; padding: 24px 16px; }

      /* 标记弹窗 */
      .form-card { max-width: 95vw; padding: 20px 16px; }
      .form-row { flex-direction: column; gap: 0; }

      /* 信息窗 */
      .custom-info-window { max-width: 70vw; }

      /* 状态栏 */
      #status-bar { font-size: 11px; padding: 6px 12px; }
    }
  </style>
</head>
<body>

  <!-- ===== 登录页 ===== -->
  <div id="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <h1>音律共享地图</h1>
        <p>登录后即可使用地图标点功能</p>
      </div>
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">登录</button>
        <button class="auth-tab" data-tab="register">注册</button>
      </div>

      <form id="login-form" class="auth-panel active">
        <div class="auth-form-group">
          <label>用户名</label>
          <input type="text" id="login-username" placeholder="请输入用户名" autocomplete="username">
        </div>
        <div class="auth-form-group">
          <label>密码</label>
          <input type="password" id="login-password" placeholder="请输入密码" autocomplete="current-password">
        </div>
        <div class="auth-error" id="login-error"></div>
        <button type="submit" class="auth-submit" id="login-submit">登录</button>
      </form>

      <form id="register-form" class="auth-panel">
        <div class="auth-form-group">
          <label>用户名</label>
          <input type="text" id="reg-username" placeholder="请设置用户名" autocomplete="username">
        </div>
        <div class="auth-form-group">
          <label>密码</label>
          <input type="password" id="reg-password" placeholder="请设置密码（至少4位）" autocomplete="new-password">
        </div>
        <div class="auth-form-group">
          <label>确认密码</label>
          <input type="password" id="reg-confirm" placeholder="请再次输入密码" autocomplete="new-password">
        </div>
        <div class="auth-divider"></div>
        <div class="auth-form-group">
          <label>团队设置</label>
          <div class="team-radios">
            <label class="radio-label">
              <input type="radio" name="team-option" value="create" checked>
              <span>创建新团队</span>
            </label>
            <label class="radio-label">
              <input type="radio" name="team-option" value="join">
              <span>加入已有团队</span>
            </label>
          </div>
        </div>
        <div id="team-create-section">
          <div class="auth-form-group">
            <label>团队名称</label>
            <input type="text" id="reg-team-name" placeholder="请输入新团队名称">
          </div>
        </div>
        <div id="team-join-section" style="display:none;">
          <div class="auth-form-group">
            <label>邀请码</label>
            <input type="text" id="reg-team-code" placeholder="请输入团队邀请码"
              style="text-transform:uppercase;letter-spacing:2px;font-family:'Courier New',monospace;">
          </div>
        </div>
        <div class="auth-error" id="reg-error"></div>
        <button type="submit" class="auth-submit" id="reg-submit">注册</button>
      </form>
    </div>
  </div>

  <!-- ===== 地图页 ===== -->
  <div id="map-page">
    <div id="map-container"></div>

    <div id="sidebar">
      <div class="sidebar-header">
        <h2>标点列表</h2>
        <span class="count" id="marker-count">0</span>
      </div>
      <div class="user-bar">
        <span id="user-greeting"></span>
        <div style="display:flex;gap:8px;">
          <a id="btn-home" href="https://www.sevencentury.cn" target="_blank">主站</a>
          <button id="btn-logout">退出登录</button>
        </div>
      </div>
      <div class="team-bar" id="team-bar" style="display:none;">
        <div class="team-info-row">
          <span class="team-tag">团队</span>
          <span class="team-name-text" id="team-name-display"></span>
        </div>
        <div class="invite-row">
          <span class="invite-label">邀请码:</span>
          <span class="invite-code" id="invite-code" title="点击复制邀请码"></span>
          <span class="invite-hint">点击复制</span>
        </div>
      </div>
      <div id="marker-list">
        <div class="empty-state">暂无标记<br>点击地图添加标点</div>
      </div>
    </div>

    <button id="sidebar-toggle">☰</button>
    <div class="sidebar-backdrop" id="sidebar-backdrop"></div>

    <div id="map-controls">
      <button class="mode-btn active" data-mode="normal">普通</button>
      <button class="mode-btn" data-mode="satellite">卫星</button>
      <button class="mode-btn" data-mode="transit">公交</button>
      <div class="controls-sep"></div>
      <button class="traffic-btn" id="btn-traffic">路况</button>
    </div>

    <div id="marker-form" class="hidden">
      <div class="form-card">
        <h3>添加标点</h3>
        <form id="marker-form-elements">
          <div class="form-group">
            <label for="input-name">名称 *</label>
            <input type="text" id="input-name" placeholder="请输入标点名称" required>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="input-category">分类</label>
              <select id="input-category">
                <option value="default">默认</option>
                <option value="food">美食</option>
                <option value="scenic">景点</option>
                <option value="hotel">住宿</option>
                <option value="transport">交通</option>
                <option value="other">其他</option>
              </select>
            </div>
            <div class="form-group">
              <label for="input-color">颜色</label>
              <input type="color" id="input-color" value="#3b82f6" style="height:40px;padding:4px;">
            </div>
          </div>
          <div class="form-group">
            <label for="input-description">描述</label>
            <textarea id="input-description" placeholder="请输入描述信息（可选）"></textarea>
          </div>
          <div class="form-actions">
            <button type="button" class="btn btn-cancel" id="btn-cancel">取消</button>
            <button type="submit" class="btn btn-primary" id="btn-add-marker">确认添加</button>
          </div>
        </form>
      </div>
    </div>

    <div id="status-bar">正在加载地图...</div>
  </div>

  <script>
    var API = 'api';

    /* ==================== API 封装 ==================== */
    function apiPost(action, params) {
      var body = new FormData();
      for (var k in params) body.append(k, params[k]);
      return fetch(API + '/' + action + '.php', { method: 'POST', body: body, credentials: 'same-origin' })
        .then(function(r) { return r.json(); });
    }

    function apiGet(action) {
      return fetch(API + '/' + action + '.php', { credentials: 'same-origin' })
        .then(function(r) { return r.json(); });
    }

    /* ==================== 动态加载地图 ==================== */
    apiGet('map_config').then(function(cfg) {
      window._AMapSecurityConfig = { securityJsCode: cfg.security || '' };
      var s = document.createElement('script');
      s.src = 'https://webapi.amap.com/maps?v=2.0&key=' + (cfg.key || '');
      s.onload = function() {
        initApp();
      };
      document.head.appendChild(s);
    });
  </script>
  <script>
    function initApp() {
    function apiDelete(action, params) {
      return fetch(API + '/' + action + '.php?id=' + params.id, {
        method: 'DELETE', credentials: 'same-origin'
      }).then(function(r) { return r.json(); });
    }

    /* ==================== 登录 / 注册 ==================== */
    /* Tab 切换 */
    document.querySelectorAll('.auth-tab').forEach(function(tab) {
      tab.addEventListener('click', function() {
        document.querySelectorAll('.auth-tab').forEach(function(t) { t.classList.remove('active'); });
        document.querySelectorAll('.auth-panel').forEach(function(p) { p.classList.remove('active'); });
        tab.classList.add('active');
        document.getElementById(tab.dataset.tab + '-form').classList.add('active');
      });
    });

    /* 团队选项切换 */
    document.querySelectorAll('input[name="team-option"]').forEach(function(radio) {
      radio.addEventListener('change', function() {
        document.getElementById('team-create-section').style.display = this.value === 'create' ? 'block' : 'none';
        document.getElementById('team-join-section').style.display = this.value === 'join' ? 'block' : 'none';
      });
    });

    /* 登录 */
    document.getElementById('login-form').addEventListener('submit', function(e) {
      e.preventDefault();
      var errEl = document.getElementById('login-error');
      errEl.classList.remove('show');
      var btn = document.getElementById('login-submit');
      btn.disabled = true;

      apiPost('login', {
        username: document.getElementById('login-username').value.trim(),
        password: document.getElementById('login-password').value
      }).then(function(res) {
        btn.disabled = false;
        if (res.success) {
          enterMapPage(res.data.username);
        } else {
          errEl.textContent = res.message;
          errEl.classList.add('show');
        }
      }).catch(function() {
        btn.disabled = false;
        errEl.textContent = '网络错误，请重试';
        errEl.classList.add('show');
      });
    });

    /* 注册 */
    document.getElementById('register-form').addEventListener('submit', function(e) {
      e.preventDefault();
      var errEl = document.getElementById('reg-error');
      errEl.classList.remove('show');

      var password = document.getElementById('reg-password').value;
      var confirm = document.getElementById('reg-confirm').value;
      if (password.length < 4) {
        errEl.textContent = '密码至少4位'; errEl.classList.add('show'); return;
      }
      if (password !== confirm) {
        errEl.textContent = '两次密码不一致'; errEl.classList.add('show'); return;
      }

      var btn = document.getElementById('reg-submit');
      btn.disabled = true;

      apiPost('register', {
        username: document.getElementById('reg-username').value.trim(),
        password: password,
        team_option: document.querySelector('input[name="team-option"]:checked').value,
        team_name: document.getElementById('reg-team-name').value.trim(),
        team_code: document.getElementById('reg-team-code').value.trim()
      }).then(function(res) {
        btn.disabled = false;
        if (res.success) {
          enterMapPage(res.data.username);
        } else {
          errEl.textContent = res.message;
          errEl.classList.add('show');
        }
      }).catch(function() {
        btn.disabled = false;
        errEl.textContent = '网络错误，请重试';
        errEl.classList.add('show');
      });
    });

    /* 退出 */
    document.getElementById('btn-logout').addEventListener('click', function() {
      apiPost('logout', {}).then(function() {
        clearMarkersFromMap();
        document.getElementById('auth-page').classList.remove('hidden');
        document.getElementById('map-page').classList.remove('visible');
        document.getElementById('login-form').reset();
        document.getElementById('register-form').reset();
        document.getElementById('team-create-section').style.display = 'block';
        document.getElementById('team-join-section').style.display = 'none';
      });
    });

    /* ==================== 地图核心 ==================== */
    var state = {
      map: null,
      infoWindow: null,
      infoLocked: false,
      markers: [],
      pendingLatLng: null,
      previewMarker: null,
      currentMode: 'normal',
      trafficLayer: null,
      roadNetLayer: null
    };

    var categoryLabels = {
      'default': '默认', 'food': '美食', 'scenic': '景点',
      'hotel': '住宿', 'transport': '交通', 'other': '其他'
    };

    function enterMapPage(username) {
      document.getElementById('auth-page').classList.add('hidden');
      document.getElementById('map-page').classList.add('visible');
      document.getElementById('user-greeting').textContent = '欢迎, ' + username;

      if (!state.map) { initMap(); }

      loadTeamInfo();
      loadMarkers();
    }

    function loadTeamInfo() {
      apiGet('team').then(function(res) {
        var teamBar = document.getElementById('team-bar');
        if (res.success && res.data) {
          teamBar.style.display = 'block';
          document.getElementById('team-name-display').textContent = res.data.name;
          document.getElementById('invite-code').textContent = res.data.invite_code;
          document.getElementById('invite-code').dataset.code = res.data.invite_code;
        } else {
          teamBar.style.display = 'none';
        }
      });
    }

    function initMap() {
      state.map = new AMap.Map('map-container', {
        zoom: 12,
        center: [121.473701, 31.230416],
        viewMode: '2D',
        mapStyle: 'amap://styles/whitesmoke'
      });

      state.infoWindow = new AMap.InfoWindow({
        isCustom: true, content: '',
        offset: new AMap.Pixel(0, -45), autoMove: true
      });

      state.map.on('click', onMapClick);
      updateStatus('地图加载完成，点击地图添加标点');
    }

    /* 地图模式切换 */
    document.querySelectorAll('.mode-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.mode-btn').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        switchMapMode(btn.dataset.mode);
      });
    });

    function switchMapMode(mode) {
      state.currentMode = mode;
      if (state.trafficLayer) {
        state.map.remove(state.trafficLayer);
        state.trafficLayer = null;
      }
      if (state.roadNetLayer) {
        state.map.remove(state.roadNetLayer);
        state.roadNetLayer = null;
      }
      if (mode === 'normal') {
        state.map.setMapStyle('amap://styles/whitesmoke');
        state.map.setLayers([new AMap.TileLayer()]);
      } else if (mode === 'satellite') {
        state.map.setMapStyle('amap://styles/normal');
        state.map.setLayers([new AMap.TileLayer.Satellite()]);
      } else if (mode === 'transit') {
        state.map.setMapStyle('amap://styles/normal');
        state.map.setLayers([new AMap.TileLayer()]);
        state.roadNetLayer = new AMap.TileLayer.RoadNet();
        state.map.add(state.roadNetLayer);
      }
      if (document.getElementById('btn-traffic').classList.contains('active')) {
        state.trafficLayer = new AMap.TileLayer.Traffic({ autoRefresh: true });
        state.map.add(state.trafficLayer);
      }
      var label = { normal: '普通', satellite: '卫星', transit: '公交' }[mode];
      updateStatus('已切换至' + label + '地图');
    }

    /* 路况开关 */
    document.getElementById('btn-traffic').addEventListener('click', function() {
      if (state.trafficLayer) {
        state.map.remove(state.trafficLayer);
        state.trafficLayer = null;
        this.classList.remove('active');
        updateStatus('已关闭路况显示');
      } else {
        state.trafficLayer = new AMap.TileLayer.Traffic({ autoRefresh: true });
        state.map.add(state.trafficLayer);
        this.classList.add('active');
        updateStatus('已开启路况显示');
      }
    });

    /* ==================== 标点管理 ==================== */
    function onMapClick(e) {
      if (state.infoLocked) {
        state.infoWindow.close();
        state.infoLocked = false;
        return;
      }
      if (state.previewMarker) {
        state.previewMarker.setMap(null);
        state.previewMarker = null;
      }
      state.pendingLatLng = e.lnglat;
      state.previewMarker = new AMap.Marker({
        position: e.lnglat, opacity: 0.5, map: state.map
      });
      showForm();
    }

    function showForm() {
      document.getElementById('marker-form').classList.remove('hidden');
      document.getElementById('input-name').focus();
    }

    function hideForm() {
      document.getElementById('marker-form').classList.add('hidden');
      document.getElementById('marker-form-elements').reset();
      document.getElementById('input-color').value = '#3b82f6';
      document.getElementById('input-name').classList.remove('error');
      if (state.previewMarker) {
        state.previewMarker.setMap(null);
        state.previewMarker = null;
      }
      state.pendingLatLng = null;
    }

    /* 提交标点 */
    document.getElementById('marker-form-elements').addEventListener('submit', function(e) {
      e.preventDefault();
      var nameInput = document.getElementById('input-name');
      var name = nameInput.value.trim();
      if (!name) { nameInput.classList.add('error'); nameInput.focus(); return; }
      nameInput.classList.remove('error');

      var btn = document.getElementById('btn-add-marker');
      btn.disabled = true;

      apiPost('markers', {
        name: name,
        description: document.getElementById('input-description').value.trim(),
        category: document.getElementById('input-category').value,
        color: document.getElementById('input-color').value,
        lng: state.pendingLatLng.getLng(),
        lat: state.pendingLatLng.getLat()
      }).then(function(res) {
        btn.disabled = false;
        if (res.success) {
          if (state.previewMarker) { state.previewMarker.setMap(null); state.previewMarker = null; }

          var data = {
            id: res.data.id,
            name: name,
            description: document.getElementById('input-description').value.trim(),
            category: document.getElementById('input-category').value,
            color: document.getElementById('input-color').value,
            lng: state.pendingLatLng.getLng(),
            lat: state.pendingLatLng.getLat()
          };
          var marker = createMarker(data);
          state.markers.push({ id: data.id, marker: marker, data: data });
          renderList();
          hideForm();
          updateStatus('已添加标点「' + name + '」，共 ' + state.markers.length + ' 个');
        } else {
          updateStatus('添加失败: ' + res.message);
        }
      }).catch(function() {
        btn.disabled = false;
        updateStatus('网络错误，请重试');
      });
    });

    document.getElementById('btn-cancel').addEventListener('click', hideForm);
    document.addEventListener('keydown', function(e) { if (e.key === 'Escape') hideForm(); });

    function createMarker(data) {
      var svg = '<svg width="30" height="40" viewBox="0 0 30 40" xmlns="http://www.w3.org/2000/svg">'
        + '<path d="M15 0C6.7 0 0 6.7 0 15c0 11.3 15 25 15 25s15-13.7 15-25C30 6.7 23.3 0 15 0z" fill="' + escapeHtml(data.color) + '"/>'
        + '<circle cx="15" cy="14" r="6" fill="#ffffff"/></svg>';

      var marker = new AMap.Marker({
        position: new AMap.LngLat(data.lng, data.lat),
        content: '<div style="cursor:pointer;">' + svg + '</div>',
        offset: new AMap.Pixel(-15, -40),
        map: state.map
      });

      marker.on('mouseover', function() { if (!state.infoLocked) showInfo(marker, data); });
      marker.on('mouseout', function() { if (!state.infoLocked) state.infoWindow.close(); });
      marker.on('click', function(e) { e.stopPropagation(); focusMarker(data.id); });
      return marker;
    }

    function showInfo(marker, data) {
      var html = '<div class="custom-info-window">'
        + '<div class="info-name">' + escapeHtml(data.name) + '</div>'
        + '<span class="info-category" style="background:' + escapeHtml(data.color) + '">'
        + escapeHtml(categoryLabels[data.category] || data.category) + '</span>'
        + (data.description ? '<div class="info-desc">' + escapeHtml(data.description) + '</div>' : '')
        + '<div class="info-coords">' + parseFloat(data.lng).toFixed(6) + ', ' + parseFloat(data.lat).toFixed(6) + '</div></div>';
      state.infoWindow.setContent(html);
      state.infoWindow.open(state.map, marker.getPosition());
    }

    function renderList() {
      var list = document.getElementById('marker-list');
      document.getElementById('marker-count').textContent = state.markers.length;
      if (state.markers.length === 0) {
        list.innerHTML = '<div class="empty-state">暂无标记<br>点击地图添加标点</div>'; return;
      }
      list.innerHTML = '';
      state.markers.forEach(function(item) {
        var el = document.createElement('div');
        el.className = 'marker-item';
        el.innerHTML = '<div class="row">'
          + '<div class="dot" style="background:' + escapeHtml(item.data.color) + '"></div>'
          + '<div class="info">'
          + '<div class="name">' + escapeHtml(item.data.name) + '</div>'
          + '<div class="coords">' + parseFloat(item.data.lng).toFixed(4) + ', ' + parseFloat(item.data.lat).toFixed(4) + '</div></div>'
          + '<button class="delete-btn" data-id="' + item.id + '" title="删除">&times;</button></div>';
        el.addEventListener('click', function(e) {
          if (e.target.classList.contains('delete-btn')) removeMarker(parseInt(e.target.dataset.id));
          else focusMarker(item.id);
        });
        list.appendChild(el);
      });
    }

    function removeMarker(id) {
      apiDelete('markers', { id: id }).then(function(res) {
        if (!res.success) { updateStatus('删除失败: ' + res.message); return; }
        var idx = state.markers.findIndex(function(m) { return m.id === id; });
        if (idx === -1) return;
        state.markers[idx].marker.setMap(null);
        state.markers.splice(idx, 1);
        state.infoWindow.close();
        renderList();
        updateStatus('已删除标点，剩余 ' + state.markers.length + ' 个');
      });
    }

    function focusMarker(id) {
      var item = state.markers.find(function(m) { return m.id === id; });
      if (!item) return;
      state.map.setZoomAndCenter(15, [item.data.lng, item.data.lat]);
      showInfo(item.marker, item.data);
      state.infoLocked = true;
    }

    function clearMarkersFromMap() {
      state.markers.forEach(function(m) { m.marker.setMap(null); });
      state.markers = [];
      if (state.infoWindow) state.infoWindow.close();
    }

    function loadMarkers() {
      clearMarkersFromMap();
      apiGet('markers').then(function(res) {
        if (res.success && res.data) {
          res.data.forEach(function(d) {
            var marker = createMarker(d);
            state.markers.push({ id: d.id, marker: marker, data: d });
          });
        }
        renderList();
        updateStatus('已加载 ' + state.markers.length + ' 个标点');
      });
    }

    /* ==================== 工具函数 ==================== */
    function escapeHtml(text) {
      var div = document.createElement('div');
      div.appendChild(document.createTextNode(text));
      return div.innerHTML;
    }

    function updateStatus(msg) {
      document.getElementById('status-bar').textContent = msg;
    }

    document.getElementById('sidebar-toggle').addEventListener('click', function() {
      var sb = document.getElementById('sidebar');
      var bd = document.getElementById('sidebar-backdrop');
      sb.classList.toggle('collapsed');
      if (window.innerWidth <= 768) {
        bd.classList.toggle('show', !sb.classList.contains('collapsed'));
      }
    });

    document.getElementById('sidebar-backdrop').addEventListener('click', function() {
      document.getElementById('sidebar').classList.add('collapsed');
      this.classList.remove('show');
    });

    function isMobile() { return window.innerWidth <= 768; }

    if (isMobile()) {
      document.getElementById('sidebar').classList.add('collapsed');
    }

    /* 邀请码点击复制 */
    document.getElementById('invite-code').addEventListener('click', function() {
      var code = this.dataset.code;
      if (!code) return;
      navigator.clipboard.writeText(code).then(function() {
        updateStatus('邀请码 ' + code + ' 已复制到剪贴板');
      }).catch(function() {
        var ta = document.createElement('textarea');
        ta.value = code;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        updateStatus('邀请码 ' + code + ' 已复制到剪贴板');
      });
    });

    /* 页面加载时检查登录状态 */
    apiGet('team').then(function(res) {
      if (res.success && res.data) {
        enterMapPage(res.data.username);
      }
    });
    } // initApp
  </script>
</body>

</html>
